<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Prácticas UPT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-container { overflow-x: auto; }
        th { white-space: nowrap; background-color: #f8f9fa; position: sticky; top: 0; }
        td { white-space: nowrap; font-size: 0.85rem; }
        .badge-pre { background-color: #17a2b8; }
        .badge-pro { background-color: #28a745; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>

<body class="bg-light">
<div class="container-fluid p-4">
    <h2 class="mb-4 text-primary">Sistema de Prácticas Profesionales</h2>
    
    <!-- Botones de acción -->
    <div class="mb-3 d-flex gap-2">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalPractica" onclick="prepararFormulario('create')">+ Nueva Práctica</button>
        <button class="btn btn-info text-white" onclick="toggleFiltros()">🔍 Filtros</button>
        <!-- Botón exportar (agregar junto a los otros botones) -->
<button class="btn btn-success" onclick="exportarExcel()">📊 Exportar Excel</button>

<!-- Script para exportar (agregar antes del cierre </script>) -->
<script>
function exportarExcel() {
    let csv = 'ID,Tipo,Alumno,DNI,Empresa,Cargo,Resolución\n';
    datosOriginales.forEach(p => {
        csv += `${p.id},${p.tipo_practica},"${p.prim_ape} ${p.seg_ape}, ${p.nombre}",${p.nro_doc},"${p.empresa}",${p.cargo},${p.resolucion}\n`;
    });
    const blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `practicas_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
}
</script>
    </div>

    <!-- Filtros (ocultos por defecto) -->
    <div id="filtros" class="card mb-3 d-none">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Tipo de Práctica</label>
                    <select class="form-select" id="filtroTipo" onchange="aplicarFiltros()">
                        <option value="">Todos</option>
                        <option value="PRE-PROFESIONAL">Pre-Profesional</option>
                        <option value="PROFESIONAL">Profesional</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Buscar por DNI/Nombre</label>
                    <input type="text" class="form-control" id="filtroBusqueda" placeholder="Ej: 71194900" onkeyup="aplicarFiltros()">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Empresa</label>
                    <input type="text" class="form-control" id="filtroEmpresa" placeholder="Nombre de empresa" onkeyup="aplicarFiltros()">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-secondary w-100" onclick="limpiarFiltros()">Limpiar</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Tabla de datos -->
    <div class="card shadow">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Listado de Estudiantes</h5>
            <span class="badge bg-primary" id="totalRegistros">0 registros</span>
        </div>
        <div class="card-body table-container">
            <table class="table table-hover table-bordered" id="tablaPracticas">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Alumno</th>
                        <th>DNI</th>
                        <th>Empresa</th>
                        <th>Cargo</th>
                        <th>Resolución</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <!-- Los datos se cargarán aquí -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para Crear/Editar -->
<div class="modal fade" id="modalPractica" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Nueva Práctica</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formPractica">
                    <input type="hidden" id="editId">
                    
                    <!-- Sección 1: Datos del Estudiante -->
                    <h6 class="text-primary border-bottom pb-2">📋 Datos del Estudiante</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-2">
                            <label class="form-label">Cód. Univ</label>
                            <input type="text" class="form-control" id="cod_univ" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Tipo Práctica</label>
                            <select class="form-select" id="tipo_practica" required>
                                <option value="PRE-PROFESIONAL">Pre-Profesional</option>
                                <option value="PROFESIONAL">Profesional</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Primer Apellido</label>
                            <input type="text" class="form-control" id="prim_ape" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Segundo Apellido</label>
                            <input type="text" class="form-control" id="seg_ape">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nombres</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Sexo</label>
                            <select class="form-select" id="sexo">
                                <option value="M">M</option>
                                <option value="F">F</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Tipo Doc</label>
                            <input type="text" class="form-control" id="tipo_doc" value="1">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">N° Documento</label>
                            <input type="text" class="form-control" id="nro_doc" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Carrera</label>
                            <input type="text" class="form-control" id="carrera" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Facultad</label>
                            <input type="text" class="form-control" id="facultad" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Créditos</label>
                            <input type="number" class="form-control" id="creditos">
                        </div>
                    </div>

                    <!-- Sección 2: Datos de la Práctica -->
                    <h6 class="text-primary border-bottom pb-2">💼 Datos de la Práctica</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Empresa / Razón Social</label>
                            <input type="text" class="form-control" id="empresa" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Área</label>
                            <input type="text" class="form-control" id="area">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Cargo</label>
                            <input type="text" class="form-control" id="cargo">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Inicio</label>
                            <input type="date" class="form-control" id="fecha_inicio">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Matrícula</label>
                            <input type="date" class="form-control" id="fecha_matri">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Egreso</label>
                            <input type="date" class="form-control" id="fecha_egreso">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Ciclo Egreso</label>
                            <input type="text" class="form-control" id="ciclo_egreso">
                        </div>
                    </div>

                    <!-- Sección 3: Datos Legales -->
                    <h6 class="text-primary border-bottom pb-2">📜 Datos Legales / Resolución</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Reg. Oficio</label>
                            <input type="text" class="form-control" id="reg_oficio">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Código Práctica</label>
                            <input type="text" class="form-control" id="codigo_practica">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Resolución</label>
                            <input type="text" class="form-control" id="resolucion">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Resolución</label>
                            <input type="date" class="form-control" id="fecha_resol">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">N° Diploma</label>
                            <input type="text" class="form-control" id="nro_diploma">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Reg. Libro</label>
                            <input type="number" class="form-control" id="reg_libro">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Reg. Folio</label>
                            <input type="number" class="form-control" id="reg_folio">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Reg. Registro</label>
                            <input type="text" class="form-control" id="reg_registro">
                        </div>
                    </div>

                    <!-- Sección 4: Autoridades -->
                    <h6 class="text-primary border-bottom pb-2">✍️ Autoridades Firmantes</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Cargo 1</label>
                            <input type="text" class="form-control" id="cargo_1" placeholder="Ej: RECTOR">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Autoridad 1</label>
                            <input type="text" class="form-control" id="autoridad_1" placeholder="Nombre completo">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cargo 2</label>
                            <input type="text" class="form-control" id="cargo_2" placeholder="Ej: SECRETARIA GENERAL">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Autoridad 2</label>
                            <input type="text" class="form-control" id="autoridad_2">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cargo 3</label>
                            <input type="text" class="form-control" id="cargo_3" placeholder="Ej: DECANO">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Autoridad 3</label>
                            <input type="text" class="form-control" id="autoridad_3">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarPractica()">💾 Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = '/api/practicas';
    let datosOriginales = [];

    // 📥 Cargar datos de la API
    async function cargarDatos() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Error en la respuesta');
            datosOriginales = await response.json();
            aplicarFiltros(); // Renderiza con filtros aplicados
            document.getElementById('totalRegistros').textContent = `${datosOriginales.length} registros`;
        } catch (error) {
            console.error('Error cargando datos:', error);
            alert('⚠️ Error al conectar con el servidor. Verifica que el backend esté corriendo.');
        }
    }

    // 🔍 Aplicar filtros a la tabla
    function aplicarFiltros() {
        const tipoFiltro = document.getElementById('filtroTipo').value;
        const busqueda = document.getElementById('filtroBusqueda').value.toLowerCase();
        const empresaFiltro = document.getElementById('filtroEmpresa').value.toLowerCase();
        
        const tbody = document.getElementById('tablaBody');
        tbody.innerHTML = '';
        
        const datosFiltrados = datosOriginales.filter(p => {
            const coincideTipo = !tipoFiltro || p.tipo_practica === tipoFiltro;
            const coincideBusqueda = !busqueda || 
                p.nro_doc?.includes(busqueda) || 
                `${p.prim_ape} ${p.seg_ape} ${p.nombre}`.toLowerCase().includes(busqueda);
            const coincideEmpresa = !empresaFiltro || p.empresa?.toLowerCase().includes(empresaFiltro);
            return coincideTipo && coincideBusqueda && coincideEmpresa;
        });
        
        datosFiltrados.forEach(practica => {
            const badgeTipo = practica.tipo_practica === 'PROFESIONAL' 
                ? '<span class="badge badge-pro">PROFESIONAL</span>' 
                : '<span class="badge badge-pre">PRE-PROFESIONAL</span>';
            
            const fila = `
                <tr>
                    <td>${practica.id}</td>
                    <td>${badgeTipo}</td>
                    <td>${practica.prim_ape} ${practica.seg_ape}, ${practica.nombre}</td>
                    <td>${practica.nro_doc}</td>
                    <td>${practica.empresa}</td>
                    <td>${practica.cargo}</td>
                    <td><small>${practica.resolucion}</small></td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editarPractica(${practica.id})">✏️</button>
                        <button class="btn btn-danger btn-sm" onclick="eliminarPractica(${practica.id})">🗑️</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += fila;
        });
    }

    // 🔄 Preparar formulario (crear o editar)
    function prepararFormulario(accion, datos = null) {
        document.getElementById('modalTitle').textContent = accion === 'create' ? 'Nueva Práctica' : 'Editar Práctica';
        document.getElementById('editId').value = datos?.id || '';
        
        if (datos) {
            // Llenar formulario con datos existentes
            document.getElementById('cod_univ').value = datos.cod_univ || '';
            document.getElementById('tipo_practica').value = datos.tipo_practica || 'PRE-PROFESIONAL';
            document.getElementById('prim_ape').value = datos.prim_ape || '';
            document.getElementById('seg_ape').value = datos.seg_ape || '';
            document.getElementById('nombre').value = datos.nombre || '';
            document.getElementById('sexo').value = datos.sexo || 'M';
            document.getElementById('tipo_doc').value = datos.tipo_doc || '1';
            document.getElementById('nro_doc').value = datos.nro_doc || '';
            document.getElementById('carrera').value = datos.carrera || '';
            document.getElementById('facultad').value = datos.facultad || '';
            document.getElementById('creditos').value = datos.creditos || '';
            document.getElementById('empresa').value = datos.empresa || '';
            document.getElementById('area').value = datos.area || '';
            document.getElementById('cargo').value = datos.cargo || '';
            document.getElementById('fecha_inicio').value = datos.fecha_inicio?.substring(0,10) || '';
            document.getElementById('fecha_matri').value = datos.fecha_matri?.substring(0,10) || '';
            document.getElementById('fecha_egreso').value = datos.fecha_egreso?.substring(0,10) || '';
            document.getElementById('ciclo_egreso').value = datos.ciclo_egreso || '';
            document.getElementById('reg_oficio').value = datos.reg_oficio || '';
            document.getElementById('codigo_practica').value = datos.codigo_practica || '';
            document.getElementById('resolucion').value = datos.resolucion || '';
            document.getElementById('fecha_resol').value = datos.fecha_resol?.substring(0,10) || '';
            document.getElementById('nro_diploma').value = datos.nro_diploma || '';
            document.getElementById('reg_libro').value = datos.reg_libro || '';
            document.getElementById('reg_folio').value = datos.reg_folio || '';
            document.getElementById('reg_registro').value = datos.reg_registro || '';
            document.getElementById('cargo_1').value = datos.cargo_1 || '';
            document.getElementById('autoridad_1').value = datos.autoridad_1 || '';
            document.getElementById('cargo_2').value = datos.cargo_2 || '';
            document.getElementById('autoridad_2').value = datos.autoridad_2 || '';
            document.getElementById('cargo_3').value = datos.cargo_3 || '';
            document.getElementById('autoridad_3').value = datos.autoridad_3 || '';
        } else {
            // Limpiar formulario para nuevo registro
            document.getElementById('formPractica').reset();
            document.getElementById('tipo_practica').value = 'PRE-PROFESIONAL';
            document.getElementById('tipo_doc').value = '1';
            document.getElementById('sexo').value = 'M';
        }
    }

    // ✏️ Editar registro existente
    function editarPractica(id) {
        const practica = datosOriginales.find(p => p.id === id);
        if (practica) {
            prepararFormulario('edit', practica);
            new bootstrap.Modal(document.getElementById('modalPractica')).show();
        }
    }

    // 💾 Guardar (crear o actualizar)
    async function guardarPractica() {
        const id = document.getElementById('editId').value;
        const metodo = id ? 'PUT' : 'POST';
        const url = id ? `${API_URL}/${id}` : API_URL;
        
        const datos = {
            cod_univ: document.getElementById('cod_univ').value,
            tipo_practica: document.getElementById('tipo_practica').value,
            prim_ape: document.getElementById('prim_ape').value,
            seg_ape: document.getElementById('seg_ape').value,
            nombre: document.getElementById('nombre').value,
            sexo: document.getElementById('sexo').value,
            tipo_doc: document.getElementById('tipo_doc').value,
            nro_doc: document.getElementById('nro_doc').value,
            carrera: document.getElementById('carrera').value,
            facultad: document.getElementById('facultad').value,
            creditos: document.getElementById('creditos').value,
            empresa: document.getElementById('empresa').value,
            area: document.getElementById('area').value,
            cargo: document.getElementById('cargo').value,
            fecha_inicio: document.getElementById('fecha_inicio').value,
            fecha_matri: document.getElementById('fecha_matri').value,
            fecha_egreso: document.getElementById('fecha_egreso').value,
            ciclo_egreso: document.getElementById('ciclo_egreso').value,
            reg_oficio: document.getElementById('reg_oficio').value,
            codigo_practica: document.getElementById('codigo_practica').value,
            resolucion: document.getElementById('resolucion').value,
            fecha_resol: document.getElementById('fecha_resol').value,
            nro_diploma: document.getElementById('nro_diploma').value,
            reg_libro: document.getElementById('reg_libro').value,
            reg_folio: document.getElementById('reg_folio').value,
            reg_registro: document.getElementById('reg_registro').value,
            cargo_1: document.getElementById('cargo_1').value,
            autoridad_1: document.getElementById('autoridad_1').value,
            cargo_2: document.getElementById('cargo_2').value,
            autoridad_2: document.getElementById('autoridad_2').value,
            cargo_3: document.getElementById('cargo_3').value,
            autoridad_3: document.getElementById('autoridad_3').value,
            raz_soc: "UNIVERSIDAD PRIVADA DE TACNA", // Valor por defecto
            abre_gyt: "B",
            grado: "BACHILLER",
            programa: "CICLO REGULAR",
            mod_obt: "P",
            mod_est: "P",
            dipl_fec_org: document.getElementById('fecha_resol').value
        };
        
        try {
            const response = await fetch(url, {
                method: metodo,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            const result = await response.json();
            
            if (response.ok) {
                alert('✅ Guardado correctamente');
                bootstrap.Modal.getInstance(document.getElementById('modalPractica')).hide();
                cargarDatos();
            } else {
                alert('❌ Error: ' + (result.error || 'No se pudo guardar'));
            }
        } catch (error) {
            console.error('Error:', error);
            alert('⚠️ Error de conexión al guardar');
        }
    }

    // 🗑️ Eliminar registro
    async function eliminarPractica(id) {
        if(confirm('¿Estás seguro de eliminar este registro? Esta acción no se puede deshacer.')) {
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('✅ Eliminado correctamente');
                    cargarDatos();
                } else {
                    alert('❌ No se pudo eliminar');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('⚠️ Error de conexión');
            }
        }
    }

    // 🔧 Funciones de filtros
    function toggleFiltros() {
        document.getElementById('filtros').classList.toggle('d-none');
    }
    
    function limpiarFiltros() {
        document.getElementById('filtroTipo').value = '';
        document.getElementById('filtroBusqueda').value = '';
        document.getElementById('filtroEmpresa').value = '';
        aplicarFiltros();
    }

    // 🚀 Inicializar
    document.addEventListener('DOMContentLoaded', () => {
        cargarDatos();
        
        // Configurar modal para limpiar al cerrar
        document.getElementById('modalPractica').addEventListener('hidden.bs.modal', () => {
            document.getElementById('formPractica').reset();
        });
    });
</script>
</body>
</html>
